<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>아쿠아 서바이벌</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #003355; overflow: hidden; touch-action: none; }
  canvas { display: block; }
  #powerLabel {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 32px);
    left: 50%; transform: translateX(-50%);
    background: rgba(21,101,192,0.88); padding: 10px 36px; border-radius: 28px;
    font-size: 28px; font-family: 'Arial Black', Arial, sans-serif; color: #fff;
    pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 10;
  }
  #msg {
    position: fixed; top: 38%; left: 50%; transform: translate(-50%,-50%);
    font-size: 52px; color: #FFD54F; text-shadow: 0 3px 8px rgba(0,0,0,0.7);
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    font-family: 'Arial Black', Arial, sans-serif; z-index: 10; white-space: nowrap;
  }
  #score {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 18px);
    right: 20px;
    font-size: 24px; color: #FFD54F; font-family: 'Arial Black', Arial, sans-serif;
    pointer-events: none; z-index: 10; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  #landscape-warn {
    display: none; position: fixed; inset: 0; background: #0a1628;
    color: #fff; font-family: Arial, sans-serif;
    flex-direction: column; align-items: center; justify-content: center;
    font-size: 20px; z-index: 100; gap: 16px; text-align: center; padding: 24px;
  }
  #landscape-warn .icon { font-size: 48px; }
  @media (orientation: landscape) and (max-height: 500px) {
    #landscape-warn { display: flex; }
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="landscape-warn"><div class="icon">📱</div><div>기기를 세로로 돌려주세요</div></div>
<div id="powerLabel">⚔ <span id="powerVal">10</span></div>
<div id="msg"></div>
<div id="score">💰 <span id="scoreVal">0</span></div>

<script>
// ─── Canvas ───
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ─── Config ───
const ROAD_W    = 6;
const ROAD_HALF = ROAD_W / 2;
const MARCH_SPD = 4;

function getScale() { return Math.min(canvas.width / ROAD_W / 1.75, 58); }
function playerY()  { return canvas.height * 0.74; }

// World → Screen
function ws(wx, wz) {
    const sc = getScale();
    return {
        x: canvas.width  / 2 + wx * sc,
        y: playerY() - (wz - S.marchZ) * sc,
    };
}

// ─── Pre-render Voronoi caustics ───
const CAUS_SIZE = 256;
const causCanvas = document.createElement('canvas');
causCanvas.width = causCanvas.height = CAUS_SIZE;
(function() {
    const cctx   = causCanvas.getContext('2d');
    const imgD   = cctx.createImageData(CAUS_SIZE, CAUS_SIZE);
    const d      = imgD.data;
    const CC     = 7;
    const hash   = (a, b) => { const v = Math.sin(a*127.1 + b*311.7)*43758.5453; return v - Math.floor(v); };
    const pts    = [];
    for (let cy = 0; cy < CC; cy++)
        for (let cx = 0; cx < CC; cx++)
            pts.push({ x:(cx+0.15+hash(cx,cy)*0.7)/CC, y:(cy+0.15+hash(cy,cx+17)*0.7)/CC });

    for (let py = 0; py < CAUS_SIZE; py++) {
        for (let px = 0; px < CAUS_SIZE; px++) {
            const i = (py*CAUS_SIZE+px)*4;
            const u = px/CAUS_SIZE, v = py/CAUS_SIZE;
            let d1=1e9, d2=1e9;
            for (const p of pts) {
                let du=u-p.x, dv=v-p.y;
                if (du>.5) du-=1; else if (du<-.5) du+=1;
                if (dv>.5) dv-=1; else if (dv<-.5) dv+=1;
                const dist=Math.sqrt(du*du+dv*dv);
                if (dist<d1){d2=d1;d1=dist;}else if(dist<d2)d2=dist;
            }
            const edge  = Math.pow(Math.max(0, 1-(d2-d1)*CC*2.8), 3.2);
            const inner = Math.pow(Math.max(0, 1-d1*CC*2.0), 2) * 0.12;
            const t = Math.min(1, edge+inner);
            const br = Math.floor(t*255);
            d[i]   = Math.min(255, Math.floor(br*0.82));
            d[i+1] = Math.min(255, br);
            d[i+2] = Math.min(255, br);
            d[i+3] = Math.floor(t*220);
        }
    }
    cctx.putImageData(imgD, 0, 0);
})();

// ─── Draw helpers ───
function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w,y, x+w,y+r); ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h, x+w-r,y+h); ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h, x,y+h-r); ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y, x+r,y); ctx.closePath();
}

// ─── Draw: Water ───
let causOffX = 0, causOffY = 0;
function drawWater(dt) {
    const W = canvas.width, H = canvas.height;

    // 베이스 그라디언트
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0,   '#001f33');
    grad.addColorStop(0.45,'#005588');
    grad.addColorStop(1,   '#0088bb');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // 코스틱 타일
    causOffX = (causOffX + dt * 16) % CAUS_SIZE;
    causOffY = (causOffY + dt * 11 + MARCH_SPD * dt * getScale() * 0.25) % CAUS_SIZE;
    ctx.save();
    ctx.globalAlpha = 0.46;
    ctx.globalCompositeOperation = 'lighter';
    const ox = -(causOffX % CAUS_SIZE), oy = -(causOffY % CAUS_SIZE);
    for (let tx = ox - CAUS_SIZE; tx < W + CAUS_SIZE; tx += CAUS_SIZE)
        for (let ty = oy - CAUS_SIZE; ty < H + CAUS_SIZE; ty += CAUS_SIZE)
            ctx.drawImage(causCanvas, tx, ty);
    ctx.restore();

    // 물결 하이라이트 라인
    const t = performance.now() / 1000;
    const scrollOff = (S.marchZ * getScale() * 0.3) % 90;
    ctx.save();
    ctx.globalAlpha = 0.10;
    ctx.strokeStyle = '#aaeeff';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 14; i++) {
        const baseY = ((i*90 + scrollOff) % (H+90)) - 45;
        ctx.beginPath();
        for (let x = 0; x <= W; x += 5) {
            const y = baseY
                + Math.sin(x*0.014 + t*1.4 + i*0.9) * 7
                + Math.sin(x*0.032 + t*0.8 + i*1.5) * 3;
            x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
    }
    ctx.restore();
}

// ─── Draw: Road ───
function drawRoad() {
    const W = canvas.width, H = canvas.height, sc = getScale();
    const rl = W/2 - ROAD_HALF*sc;
    const rr = W/2 + ROAD_HALF*sc;
    const rw = rr - rl;

    // 측면 그림자 (물에 자연스럽게 합체)
    const sg = ctx.createLinearGradient(rl-24, 0, rl, 0);
    sg.addColorStop(0,'rgba(0,0,0,0)'); sg.addColorStop(1,'rgba(0,0,0,0.38)');
    ctx.fillStyle = sg; ctx.fillRect(rl-24, 0, 24, H);
    const sgr = ctx.createLinearGradient(rr, 0, rr+24, 0);
    sgr.addColorStop(0,'rgba(0,0,0,0.38)'); sgr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = sgr; ctx.fillRect(rr, 0, 24, H);

    // 도로 면
    ctx.fillStyle = '#546E7A';
    ctx.fillRect(rl, 0, rw, H);

    // 도로 미세 텍스처 라인
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 1;
    for (let x = rl+sc; x < rr; x += sc*0.8) {
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }

    // 가장자리 하이라이트
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(rl,0); ctx.lineTo(rl,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rr,0); ctx.lineTo(rr,H); ctx.stroke();

    // 중앙 점선
    const dashL = sc*1.1, gapL = sc*0.75, period = dashL+gapL;
    const offset = (S.marchZ * sc) % period;
    ctx.setLineDash([dashL, gapL]);
    ctx.lineDashOffset = offset;
    ctx.strokeStyle = 'rgba(255,255,255,0.32)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
    ctx.setLineDash([]);
}

// ─── Draw: Gate ───
function drawGate(g) {
    const p = ws(g.x, g.z);
    if (p.y < -70 || p.y > canvas.height+70) return;
    const sc = getScale();
    const gw = sc*2.1, gh = sc*1.9;
    const isPlus = g.value > 0;

    ctx.save();
    ctx.shadowColor = isPlus ? '#66FF88' : '#FF5566';
    ctx.shadowBlur  = 20;
    roundRect(p.x-gw/2, p.y-gh/2, gw, gh, 10);
    ctx.fillStyle   = isPlus ? 'rgba(46,125,50,0.80)' : 'rgba(183,28,28,0.80)';
    ctx.fill();
    ctx.strokeStyle = isPlus ? '#A5D6A7' : '#EF9A9A';
    ctx.lineWidth   = 2;
    ctx.stroke();
    ctx.shadowBlur  = 0;
    ctx.restore();

    ctx.fillStyle    = '#fff';
    ctx.font         = `bold ${Math.round(sc*0.68)}px "Arial Black",Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText((isPlus?'+':'')+g.value, p.x, p.y);
}

// ─── Draw: Soldier ───
function drawSoldier(s) {
    const sc  = getScale();
    const r   = sc * 0.28;
    const bob = Math.abs(Math.sin(s.bobPhase)) * 2;
    const px  = canvas.width/2 + (S.armyX + s.offX) * sc;
    const py  = playerY() + s.offZ * sc - bob;

    // 그림자
    ctx.beginPath();
    ctx.ellipse(px, py+r+1, r*0.85, r*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fill();

    // 몸통
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
    ctx.fillStyle = '#2196F3'; ctx.fill();
    ctx.strokeStyle = '#90CAF9'; ctx.lineWidth = 1.5; ctx.stroke();

    // 헬멧
    ctx.beginPath(); ctx.arc(px, py-r*0.22, r*0.58, Math.PI, 0);
    ctx.fillStyle = '#1565C0'; ctx.fill();
}

// ─── Draw: Enemy ───
function drawEnemy(e) {
    const sc = getScale();
    const p  = ws(e.x, e.z);
    if (p.y < -70 || p.y > canvas.height+70) return;
    const r  = e.type==='boss' ? sc*0.52 : sc*0.29;

    // 그림자
    ctx.beginPath();
    ctx.ellipse(p.x, p.y+r+1, r*0.85, r*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fill();

    // 몸통
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle   = e.type==='boss' ? '#E57373' : '#E53935';
    ctx.fill();
    ctx.strokeStyle = e.type==='boss' ? '#FFCDD2' : '#B71C1C';
    ctx.lineWidth   = e.type==='boss' ? 2.5 : 1.5;
    ctx.stroke();

    // HP 바
    const bw = r*3.6, bh = 4;
    const bx = p.x-bw/2, by = p.y-r-11;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    roundRect(bx-1, by-1, bw+2, bh+2, 2); ctx.fill();
    ctx.fillStyle = '#F44336';
    const fw = Math.max(0, bw*(e.hp/e.maxHp));
    if (fw>0) { roundRect(bx, by, fw, bh, 2); ctx.fill(); }

    // HP 숫자
    const fs = Math.max(9, Math.round(r*0.88));
    ctx.fillStyle    = '#fff';
    ctx.font         = `bold ${fs}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e.hp, p.x, p.y);
}

// ─── Draw: Projectile ───
function drawProjectile(proj) {
    const sc = getScale();
    const px = canvas.width/2 + proj.x * sc;
    const py = playerY() - (proj.z - S.marchZ) * sc;
    if (py < -12 || py > canvas.height+12) return;

    // 꼬리
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py + sc*0.42);
    ctx.strokeStyle = 'rgba(255,210,0,0.38)'; ctx.lineWidth = 2.5; ctx.stroke();

    // 탄환
    ctx.beginPath(); ctx.arc(px, py, 4.5, 0, Math.PI*2);
    ctx.fillStyle = '#FFD700'; ctx.fill();
    ctx.strokeStyle = '#FFFDE7'; ctx.lineWidth = 1; ctx.stroke();
}

// ─── Game State ───
const S = {
    score: 0, marchZ: 0,
    mouseX: 0, armyX: 0,
    soldiers: [], enemies: [], gates: [], projectiles: [],
    nextSpawnZ: 15, wave: 0, gameOver: false,
};

// ─── Input ───
function updatePointer(cx) {
    const worldX = (cx - canvas.width/2) / getScale();
    S.mouseX = Math.max(-ROAD_HALF+0.8, Math.min(ROAD_HALF-0.8, worldX));
}
canvas.addEventListener('mousemove',  e => updatePointer(e.clientX));
canvas.addEventListener('touchmove',  e => { e.preventDefault(); updatePointer(e.touches[0].clientX); }, { passive:false });
canvas.addEventListener('touchstart', e => { e.preventDefault(); updatePointer(e.touches[0].clientX); }, { passive:false });

// ─── Messages ───
let msgTimer = 0;
function showMsg(text) {
    const el = document.getElementById('msg');
    el.textContent = text; el.style.opacity = 1; msgTimer = 1.2;
}

// ─── Army ───
function arrangeCircle() {
    const alive = S.soldiers.filter(s=>s.alive);
    const n = alive.length;
    if (!n) return;
    if (n===1) { alive[0].offX=0; alive[0].offZ=0; return; }
    let placed=0, ring=0;
    while (placed < n) {
        ring++;
        const radius = ring * 0.45;
        const count  = Math.min(Math.floor(2*Math.PI*radius/0.5), n-placed);
        for (let i=0; i<count && placed<n; i++) {
            const angle = (i/count)*Math.PI*2;
            alive[placed].offX = Math.cos(angle)*radius;
            alive[placed].offZ = Math.sin(angle)*radius;
            placed++;
        }
    }
}
function totalPower() { return S.soldiers.filter(s=>s.alive).length*(10+Math.floor(S.score/500)); }
function updatePower() { document.getElementById('powerVal').textContent = totalPower(); }

function addSoldiers(count) {
    for (let i=0;i<count;i++)
        S.soldiers.push({ offX:0, offZ:0, bobPhase:Math.random()*Math.PI*2, alive:true, atkTimer:Math.random()*0.3 });
    arrangeCircle(); updatePower();
}
function removeSoldiers(count) {
    const alive = S.soldiers.filter(s=>s.alive);
    const n = Math.min(count, alive.length);
    for (let i=0;i<n;i++) alive[alive.length-1-i].alive = false;
    S.soldiers = S.soldiers.filter(s=>s.alive);
    arrangeCircle(); updatePower();
}

// ─── Spawn ───
function spawnSegment(z) {
    S.wave++;
    const numPairs = 1 + Math.floor(S.wave/3);
    for (let i=0; i<numPairs; i++) {
        const gz   = z + i*8;
        const pv   = Math.ceil(Math.random()*3 + S.wave*0.3);
        const mv   = -Math.ceil(Math.random()*2 + S.wave*0.2);
        const flip = Math.random()>.5;
        S.gates.push({ z:gz, x:-1.5, value:flip?pv:mv, hit:false });
        S.gates.push({ z:gz, x: 1.5, value:flip?mv:pv, hit:false });
    }
    const ez = z + numPairs*8 + 5;
    const ne = Math.min(2+S.wave, 12);
    for (let i=0; i<ne; i++) {
        const hp = 10 + S.wave*8;
        S.enemies.push({
            x: (Math.random()-0.5)*(ROAD_W-2),
            z: ez + i*1.5 + Math.random(),
            hp, maxHp:hp, alive:true, type:'enemy', atkTimer:0,
        });
    }
    if (S.wave%5===0) {
        const bhp = 100 + S.wave*40;
        S.enemies.push({ x:0, z:ez+ne*1.5+4, hp:bhp, maxHp:bhp, alive:true, type:'boss', atkTimer:0 });
    }
    S.nextSpawnZ = ez + ne*1.5 + 12;
}

// ─── Init ───
addSoldiers(1);
spawnSegment(S.nextSpawnZ);

// ─── Game Loop ───
let lastTime = performance.now();
function animate(timestamp) {
    requestAnimationFrame(animate);
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    drawWater(dt);
    drawRoad();

    if (S.gameOver) return;

    const alive = S.soldiers.filter(s=>s.alive);
    if (!alive.length) {
        S.gameOver = true;
        showMsg('GAME OVER');
        setTimeout(()=>location.reload(), 2500);
        return;
    }

    // March
    S.marchZ += MARCH_SPD * dt;
    S.armyX   = S.mouseX;
    alive.forEach(s => s.bobPhase += dt*7);

    // Gate collisions
    const hitZs = new Set();
    S.gates = S.gates.filter(g => {
        if (!g.hit) {
            if (Math.abs(g.z-S.marchZ)<1.2 && Math.abs(g.x-S.armyX)<1.5) {
                g.value>0 ? (addSoldiers(g.value),  showMsg(`+${g.value} 병사!`))
                          : (removeSoldiers(-g.value), showMsg(`${g.value} 병사`));
                hitZs.add(g.z); return false;
            }
        }
        return g.z >= S.marchZ - 15;
    });
    if (hitZs.size>0) S.gates = S.gates.filter(g => !hitZs.has(g.z));

    // Soldier attack
    const visibleEnemies = S.enemies.filter(e=>e.alive);
    alive.forEach(s => {
        s.atkTimer += dt;
        if (s.atkTimer < 0.4) return;
        let nearest=null, nd=Infinity;
        visibleEnemies.forEach(e => {
            const dz = e.z - S.marchZ;
            if (dz>0 && dz<12 && dz<nd) { nd=dz; nearest=e; }
        });
        if (nearest) {
            s.atkTimer = 0;
            S.projectiles.push({ x: S.armyX+s.offX, z: S.marchZ+s.offZ });
        }
    });

    // Enemy movement + melee
    visibleEnemies.forEach(e => {
        const dz = e.z - S.marchZ;
        if (dz>0 && dz<15) {
            e.z -= (e.type==='boss' ? 1.5 : 2.5) * dt;
            e.x += (S.armyX - e.x) * 0.5 * dt;
        }
        const cr = e.type==='boss' ? 2.5 : 1.5;
        if (Math.abs(e.z-S.marchZ)<cr && Math.abs(e.x-S.armyX)<cr) {
            e.atkTimer += dt;
            if (e.atkTimer > 0.3) {
                e.atkTimer = 0;
                removeSoldiers(e.type==='boss' ? 2 : 1);
                if (!S.soldiers.filter(s=>s.alive).length) return;
            }
        }
    });
    S.enemies = S.enemies.filter(e => e.alive && e.z >= S.marchZ-5);

    // Projectiles
    const dmg = 5 + Math.floor(S.score/300);
    S.projectiles = S.projectiles.filter(p => {
        p.z += 25 * dt;
        if (p.z > S.marchZ+22) return false;
        for (const e of S.enemies) {
            if (!e.alive) continue;
            const dx=e.x-p.x, dz=e.z-p.z;
            if (dx*dx+dz*dz < 0.55*0.55) {
                e.hp -= dmg;
                if (e.hp<=0) {
                    e.alive = false;
                    S.score += e.type==='boss' ? 200 : 30;
                    document.getElementById('scoreVal').textContent = S.score;
                    updatePower();
                }
                return false;
            }
        }
        return true;
    });

    // Spawn next segment
    if (S.marchZ+30 > S.nextSpawnZ) spawnSegment(S.nextSpawnZ);

    // Msg timer
    if (msgTimer>0) { msgTimer-=dt; if(msgTimer<=0) document.getElementById('msg').style.opacity=0; }

    // ─── Render objects ───
    S.gates.forEach(g => drawGate(g));
    S.enemies.forEach(e => { if(e.alive) drawEnemy(e); });
    S.projectiles.forEach(p => drawProjectile(p));
    alive.forEach(s => drawSoldier(s));
}

requestAnimationFrame(animate);
</script>
</body>
</html>
